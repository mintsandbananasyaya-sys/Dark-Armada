<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Dark Armada | Build Plans</title>
  <style>
    :root {
      --text: #f4f1e8;
      --muted: #b1b6c7;
      --line: rgba(190, 166, 115, 0.18);
      --gold: #d5b16a;
      --gold-soft: #f0d29c;
      --crimson: #8a1f2b;
      --sea: #123449;
      --shadow: 0 0 34px rgba(213, 177, 106, 0.12);
      --max: 1260px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, Segoe UI, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 18%, rgba(213, 177, 106, 0.08), transparent 18%),
        radial-gradient(circle at 82% 24%, rgba(18, 52, 73, 0.22), transparent 22%),
        linear-gradient(180deg, #02040a 0%, #06080f 38%, #091725 100%);
    }

    a { text-decoration: none; color: inherit; }

    .container { width: min(calc(100% - 32px), var(--max)); margin: 0 auto; }

    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; margin-top: 14px;
      border-radius: 20px; border: 1px solid var(--line);
      background: rgba(5, 9, 18, 0.85);
      backdrop-filter: blur(14px);
    }

    .brand { display: flex; gap: 10px; font-weight: 900; }

    .nav-links { display: flex; gap: 16px; }

    .nav-links a { color: var(--muted); font-weight: 700; }
    .nav-links a.active, .nav-links a:hover {
      color: var(--gold-soft);
      text-shadow: 0 0 10px rgba(213,177,106,0.4);
    }

    .hero {
      min-height: 80vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 60px 0;
    }

    .hero h1 {
      font-size: clamp(3rem, 8vw, 5rem);
      margin-bottom: 16px;
    }

    .hero .shine {
      color: var(--gold-soft);
      text-shadow: 0 0 18px rgba(213,177,106,0.4);
    }

    .hero p {
      color: var(--muted);
      max-width: 600px;
      line-height: 1.7;
      margin: 0 auto 24px;
    }

    .empty-card {
      padding: 40px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: rgba(10,16,28,0.9);
      max-width: 600px;
      margin: 0 auto;
      box-shadow: var(--shadow);
    }

    .empty-card h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .empty-card p {
      color: var(--muted);
    }

    footer {
      margin-top: 60px;
      padding: 30px 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="container">
    <nav class="navbar">
      <div class="brand">☠ The Dark Armada</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="command.html">Command</a>
        <a href="fleet.html">Fleet</a>
        <a href="lore.html">Lore</a>
        <a href="join.html">Join</a>
        <a href="rules.html">Rules</a>
        <a href="build-plans.html" class="active">Build Plans</a>
      </div>
    </nav>
  </div>

  <section class="hero">
    <div>
      <h1>Build <span class="shine">Plans</span></h1>
      <p>
        Future projects, expansion concepts, and major builds of the Dark Armada will be recorded here.
      </p>

      <div class="empty-card">
        <h2>No plans yet</h2>
        <p>
          The Armada has not revealed its construction ambitions... yet.
        </p>
      </div>
    </div>
  </section>

  <footer>
    © 2026 The Dark Armada. All rights reserved.
  </footer>

  <!-- 🌊 Waves -->
  <div class="waves">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
  </div>

  <!-- 🌫 Fog -->
  <div class="fog">
    <div class="fog-layer1"></div>
    <div class="fog-layer2"></div>
  </div>

  <style>
  /* 🌊 Waves */
  .waves {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 200px;
    overflow: hidden;
    pointer-events: none;
    z-index: -1;
  }

  .wave {
    position: absolute;
    width: 200%;
    height: 100%;
    background: radial-gradient(circle at 50% 0%, rgba(18,52,73,0.4), transparent 70%);
    opacity: 0.25;
  }

  .wave1 { animation: waveMove 20s linear infinite; }
  .wave2 { animation: waveMove 30s linear infinite reverse; opacity: 0.18; }
  .wave3 { animation: waveMove 40s linear infinite; opacity: 0.12; }

  @keyframes waveMove {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* 🌫 Fog */
  .fog {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 300px;
    pointer-events: none;
    z-index: 0;
  }

  .fog-layer1,
  .fog-layer2 {
    position: absolute;
    width: 200%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
    filter: blur(20px);
  }

  .fog-layer1 {
    animation: fogMove 60s linear infinite;
  }

  .fog-layer2 {
    animation: fogMove 90s linear infinite reverse;
    opacity: 0.6;
  }

  @keyframes fogMove {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  </style>

</body>
</html>
